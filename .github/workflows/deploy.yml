name: Build & Deploy to EasyPanel

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: the-winlab/rugby-manager

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ env.IMAGE_NAME }}:latest,ghcr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Deploy to EasyPanel
        env:
          EASYPANEL_URL: https://xhgix3.easypanel.host
          EASYPANEL_EMAIL: ${{ secrets.EASYPANEL_EMAIL }}
          EASYPANEL_PASSWORD: ${{ secrets.EASYPANEL_PASSWORD }}
          IMAGE_TAG: ghcr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
          GH_ACTOR: ${{ github.actor }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Login to get a fresh session token
          echo "Logging in to EasyPanel..."
          LOGIN_RESPONSE=$(curl -sf --retry 3 --retry-delay 5 \
            -X POST "$EASYPANEL_URL/api/trpc/auth.login" \
            -H "Content-Type: application/json" \
            -d "{\"json\":{\"email\":\"$EASYPANEL_EMAIL\",\"password\":\"$EASYPANEL_PASSWORD\"}}")

          TOKEN=$(echo "$LOGIN_RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['result']['data']['json']['token'])")
          echo "Login OK"

          # Update image source
          echo "Updating image source..."
          curl -sf --retry 3 --retry-delay 5 \
            -X POST "$EASYPANEL_URL/api/trpc/services.app.updateSourceImage" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"json\":{\"projectName\":\"rugby-manager\",\"serviceName\":\"app\",\"source\":{\"type\":\"image\",\"image\":\"$IMAGE_TAG\",\"username\":\"$GH_ACTOR\",\"password\":\"$GH_TOKEN\"}}}"
          echo "Image updated"

          # Trigger deploy
          echo "Triggering deploy..."
          curl -sf --retry 3 --retry-delay 5 \
            -X POST "$EASYPANEL_URL/api/trpc/services.app.deployService" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"json":{"projectName":"rugby-manager","serviceName":"app"}}'
          echo "Deploy triggered"
